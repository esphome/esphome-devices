esphome:
  name: esw15
  friendly_name: ESW15

esp8266:
  board: esp01_1m
  restore_from_flash: true

preferences:
  flash_write_interval: 60min

logger:

api:

ota:
  - platform: esphome

wifi:
  # ssid: !secret wifi_ssid # Uncomment this line
  # password: !secret wifi_password # Uncomment this line
  # min_auth_mode: WPA
  # domain: .lan
  ap:
    {}
  # Logic to handle the Status LED based on connectivity
  on_connect:
    - light.turn_off: status_led
  on_disconnect:
    - light.turn_on:
        id: status_led
        effect: "Blink"

captive_portal:

web_server:
  version: 3

binary_sensor:
  # Button
  - platform: gpio
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
      inverted: true
    name: "Button"
    on_press:
      - switch.toggle: relay

switch:
  # Outlet Relay
  - platform: gpio
    name: "Outlet"
    pin: GPIO5
    id: relay
    restore_mode: RESTORE_DEFAULT_OFF

  # Internal Switch for auto nightlight logic
  - platform: template
    id: nightlight_gate
    internal: true
    optimistic: true
    on_turn_on:
      - script.execute: refresh_output
    on_turn_off:
      - script.execute: refresh_output

number:
  - platform: template
    name: "Nightlight Brightness"
    id: nightlight_brightness
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 100
    optimistic: true
    on_value:
      then:
        - script.execute: refresh_output

sensor:
  # Ambient Light Sensor (LDR)
  - platform: adc
    pin: A0
    name: "Ambient Light Sensor"
    id: ambient_light
    update_interval: 1s
    filters:
      - multiply: 1.0
    # Trigger the script immediately when the light level changes
    on_value:
      then:
        - script.execute: update_nightlight

  # HLW8012 Power Monitoring
  - platform: hlw8012
    sel_pin: GPIO15
    cf_pin: GPIO13
    cf1_pin: GPIO12
    current_resistor: 0.0009746397694524496
    voltage_divider: 1966
    current:
      name: "Current"
    voltage:
      name: "Voltage"
    power:
      name: "Power"
    energy:
      name: "Energy"
    change_mode_every: 3
    update_interval: 5s

light:
  # Internal light handles the soft ramp (1s)
  - platform: monochromatic
    id: nightlight_managed
    output: nightlight_pwm
    internal: true
    default_transition_length: 1s

  # Blue Status LED - Marked internal to hide from HA
  - platform: binary
    id: status_led
    output: status_led_out
    internal: true
    effects:
      - strobe:
          name: "Blink"
          colors:
            - state: true
              duration: 0.5s
            - state: false
              duration: 0.5s

output:
  # PWM for dimming the nightlight
  - platform: esp8266_pwm
    pin: GPIO4
    id: nightlight_pwm

  # GPIO for status LED
  - platform: gpio
    pin: GPIO16
    id: status_led_out

select:
  # Nightlight On/Off/Auto
  - platform: template
    name: "Nightlight Mode"
    id: nightlight_mode
    options:
      - "On"
      - "Off"
      - "Auto"
    initial_option: "Auto"
    optimistic: true
    on_value:
      - script.execute: update_nightlight

script:
  # Logic: Transition internal light based on (Slider / 100) * Gate
  - id: refresh_output
    then:
      - if:
          condition:
            lambda: 'return id(nightlight_gate).state;'
          then:
            - light.turn_on:
                id: nightlight_managed
                brightness: !lambda 'return id(nightlight_brightness).state / 100.0;'
          else:
            - light.turn_off: nightlight_managed

  # This script only touches the "Gate", not the brightness
  - id: update_nightlight
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(nightlight_mode).current_option() == "On";'
          then:
            - switch.turn_on: nightlight_gate
      - if:
          condition:
            lambda: 'return id(nightlight_mode).current_option() == "Off";'
          then:
            - switch.turn_off: nightlight_gate
      - if:
          condition:
            lambda: 'return id(nightlight_mode).current_option() == "Auto";'
          then:
            - lambda: |-
                float current_lux = id(ambient_light).state;
                // Deadband Logic:
                // If it gets darker than 0.03, turn ON
                if (current_lux < 0.03) {
                  id(nightlight_gate).turn_on();
                }
                // If it gets brighter than 0.05, turn OFF
                else if (current_lux > 0.05) {
                  id(nightlight_gate).turn_off();
                }
                // If it is between 0.03 and 0.05, do nothing (maintain state)
