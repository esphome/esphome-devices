esphome:
  name: esw15
  friendly_name: ESW15

esp8266:
  board: esp01_1m
  restore_from_flash: true

preferences:
  flash_write_interval: 60min

logger:

binary_sensor:
  # Button
  - platform: gpio
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
      inverted: true
    name: "Button"
    on_press:
      - switch.toggle: relay

switch:
  # Outlet Relay
  - platform: gpio
    name: "Outlet"
    pin: GPIO5
    id: relay
    restore_mode: RESTORE_DEFAULT_OFF

sensor:
  # Ambient Light Sensor (LDR) - Internal sensor with 1s interval for quick update to the night light PID
  - platform: adc
    pin: A0
    name: "Ambient Light Sensor Internal"
    internal: true
    update_interval: 1s
    id: ambient_light_internal

  # Ambient Light Sensor (LDR) - External copy with slower HA reporting interval
  - platform: copy
    source_id: ambient_light_internal
    name: "Ambient Light Sensor"
    filters:
      - heartbeat: 60s

  # HLW8012 Power Monitoring
  - platform: hlw8012
    sel_pin: GPIO15
    cf_pin: GPIO13
    cf1_pin: GPIO12
    current_resistor: 0.0009746397694524496
    voltage_divider: 1966
    current:
      name: "Current"
    voltage:
      name: "Voltage"
    power:
      name: "Power"
    energy:
      name: "Energy"
    change_mode_every: 3
    update_interval: 5s

light:
  # Internal light handles the soft ramp (1s)
  - platform: monochromatic
    id: nightlight_managed
    output: nightlight_pwm
    internal: true
    default_transition_length: 1s

  # Blue Status LED - Marked internal to hide from HA
  - platform: binary
    id: status_led
    output: status_led_out
    internal: true
    effects:
      - strobe:
          name: "Blink"
          colors:
            - state: true
              duration: 0.5s
            - state: false
              duration: 0.5s

output:
  # PWM for dimming the nightlight
  - platform: esp8266_pwm
    pin: GPIO4
    id: nightlight_pwm

  # GPIO for status LED
  - platform: gpio
    pin: GPIO16
    id: status_led_out
