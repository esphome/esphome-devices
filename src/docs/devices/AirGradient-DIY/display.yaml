font:
  - file: "fonts/helvetica.ttf"
    id: helvetica
    size: 12
    glyphs: |
      !"%()+=,-_.:ยฐ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyzยตยณ/

display:
  - platform: ssd1306_i2c
    model: "SSD1306 64x48"
    address: 0x3C
    lambda: |-
      // For Celsius, uncomment the below line
      // it.printf(0, 0, id(helvetica), "%.1fยฐC", id(temp).state);
      // For Fahrenheit, uncomment the below line
      // it.printf(0, 0, id(helvetica), "%.1fยฐF", (id(temp).state * 1.8) + 32);
      it.printf(0, 12, id(helvetica), "%.1f%% RH", id(humidity).state);
      it.printf(0, 24, id(helvetica), "%.0fppm", id(co2).state);
      it.printf(0, 36, id(helvetica), "%.0f ยตg/mยณ", id(pm25).state);
